{% extends 'users/userhome.html' %}
{% block body %}

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8 col-md-10">

            <div class="card shadow-lg border-0 rounded-4 overflow-hidden">
                <!-- Card Header -->
                <div class="card-header bg-primary text-white text-center py-4">
                    <h2 class="mb-0 fw-bold">Edit Profile</h2>
                    <p class="mb-0 mt-2">Update your personal information</p>
                </div>

                <!-- Card Body -->
                <div class="card-body p-4 p-md-5">
                    <form action="/myapp/editprofile_post/" method="post" enctype="multipart/form-data">
                        {% csrf_token %}

                        <div class="row g-4">

                            <!-- Profile Photo Section -->
                            <div class="col-12 text-center mb-4">
                                <div class="position-relative d-inline-block">
                                    <img
                                        src="{{ data.photo|default:'https://via.placeholder.com/180?text=Profile' }}"
                                        alt="Current Profile Photo"
                                        class="img-fluid rounded-circle shadow mb-3 current-photo-preview"
                                        id="photoPreview"
                                        style="width: 160px; height: 160px; object-fit: cover; border: 5px solid #ffffff;"
                                    >
                                    <label for="photo" class="btn btn-sm btn-outline-primary position-absolute bottom-0 end-0 rounded-circle p-2" style="cursor: pointer;">
                                        <i class="fas fa-camera"></i>
                                    </label>
                                </div>
                                <input
                                    type="file"
                                    class="form-control d-none"
                                    id="photo"
                                    name="photo"
                                    accept="image/*"
                                >
                                <small class="text-muted d-block mt-2">Click the camera icon to change photo (optional)</small>
                            </div>

                            <!-- Form Fields -->
                            <div class="col-md-6">
                                <label for="name" class="form-label fw-bold text-muted">Full Name</label>
                                <input type="text" class="form-control" id="name" name="name" value="{{ data.name }}" required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-bold text-muted">Gender</label>
                                <div class="d-flex flex-wrap gap-3 mt-2">
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="gender" id="male" value="male" {% if data.gender == 'male' %}checked{% endif %} required>
                                        <label class="form-check-label" for="male">Male</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="gender" id="female" value="female" {% if data.gender == 'female' %}checked{% endif %}>
                                        <label class="form-check-label" for="female">Female</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="gender" id="others" value="others" {% if data.gender == 'others' %}checked{% endif %}>
                                        <label class="form-check-label" for="others">Other</label>
                                    </div>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <label for="dob" class="form-label fw-bold text-muted">Date of Birth</label>
                                <input type="date" class="form-control" id="dob" name="dob" value="{{ data.dob|date:'Y-m-d' }}" required>
                            </div>

                            <div class="col-md-6">
                                <label for="email" class="form-label fw-bold text-muted">Email Address</label>
                                <input type="email" class="form-control" id="email" name="email" value="{{ data.email }}" required>
                            </div>

                            <div class="col-md-6">
                                <label for="phone" class="form-label fw-bold text-muted">Phone Number</label>
                                <input type="tel" pattern="[0-9]{10}" class="form-control" id="phone" name="phone" value="{{ data.phone }}" required>
                                <small class="text-muted">10-digit number (e.g., 9876543210)</small>
                            </div>

                            <div class="col-12">
                                <h5 class="mt-3 mb-3 text-primary fw-bold border-bottom pb-2">Address Details</h5>
                            </div>

                            <div class="col-md-6">
                                <label for="place" class="form-label fw-bold text-muted">Place</label>
                                <input type="text" class="form-control" id="place" name="place" value="{{ data.place }}" required>
                            </div>

                            <div class="col-md-6">
                                <label for="city" class="form-label fw-bold text-muted">City</label>
                                <input type="text" class="form-control" id="city" name="city" value="{{ data.city }}" required>
                            </div>

                            <div class="col-md-6">
                                <label for="district" class="form-label fw-bold text-muted">District</label>
                                <input type="text" class="form-control" id="district" name="district" value="{{ data.district }}" required>
                            </div>

                            <div class="col-md-6">
                                <label for="pincode" class="form-label fw-bold text-muted">Pincode</label>
                                <input type="text" class="form-control" id="pincode" name="pincode" value="{{ data.pincode }}" required>
                            </div>

                        </div>

                        <!-- Buttons -->
                        <div class="mt-5 text-center text-md-end">
                            <a href="/myapp/viewprofile_get/#a" class="btn btn-outline-secondary me-3 px-4">
                                <i class="fas fa-times me-2"></i> Cancel
                            </a>
                            <button type="submit" class="btn btn-primary px-5">
                                <i class="fas fa-save me-2"></i> Save Changes
                            </button>
                        </div>
                    </form>
                </div>

                <!-- Footer -->
                <div class="card-footer bg-light text-center py-3 border-0">
                    <small class="text-muted">All fields marked are required</small>
                </div>
            </div>

        </div>
    </div>
</div>

<!-- Simple JS for photo preview -->
<script>
    document.getElementById('photo').addEventListener('change', function(event) {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('photoPreview').src = e.target.result;
            };
            reader.readAsDataURL(file);
        }
    });
</script>

<style>
    /* Safe minimal styles – can move to style.css */
    .card {
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .card:hover {
        transform: translateY(-5px);
        box-shadow: 0 20px 40px rgba(0,0,0,0.12) !important;
    }
    .form-label {
        font-size: 0.95rem;
    }
    input:focus {
        border-color: #0d6efd !important;
        box-shadow: 0 0 0 0.25rem rgba(13,110,253,.15) !important;
    }
</style>

{% endblock %}
